services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ${BACKEND_IMAGE:-ghcr.io/floley/statisfaction-backend}:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/floley/statisfaction-backend}:${IMAGE_TAG:-latest}
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db/${POSTGRES_DB}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    ports:
      - "8001:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - internal

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/floley/statisfaction-frontend}:${IMAGE_TAG:-latest}
    ports:
      - "5174:80"
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
