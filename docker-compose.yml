services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGPORT: "5490"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 5490"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    image: ghcr.io/${OWNER_LC}/statisfaction-backend:latest
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:7745:7745"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: ghcr.io/${OWNER_LC}/statisfaction-frontend:latest
    restart: unless-stopped
    ports:
      - "${TAILSCALE_IP}:7746:7746"
    networks:
      - internal

volumes:
  pgdata:

networks:
  internal:
