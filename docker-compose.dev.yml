services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: statisfaction
      POSTGRES_PASSWORD: statisfaction
      POSTGRES_DB: statisfactiondb
      PGPORT: "5490"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./scripts/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U statisfaction -d statisfactiondb -p 5490"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5490:5490"
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn main:app --reload --host 0.0.0.0 --port 7745
    ports:
      - "127.0.0.1:7745:7745"
    environment:
      DATABASE_URL: postgresql://statisfaction:statisfaction@db:5490/statisfactiondb
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:7746}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "127.0.0.1:7746:7746"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:7745}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - internal

volumes:
  pgdata_dev:

networks:
  internal:
