services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-statisfaction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-statisfaction}
      POSTGRES_DB: ${POSTGRES_DB:-statisfactiondb}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-statisfaction} -d ${POSTGRES_DB:-statisfactiondb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8001
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://statisfaction:statisfaction@db:5432/statisfactiondb}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5174}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "127.0.0.1:5174:5174"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - internal

volumes:
  pgdata_dev:

networks:
  internal:
