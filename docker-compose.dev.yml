services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-todo}
      POSTGRES_DB: ${POSTGRES_DB:-tododb}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    networks:
      - internal

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8001
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://todo:todo@db:5432/tododb}
    volumes:
      - ./backend:/app
    depends_on:
      - db
    networks:
      - internal

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "127.0.0.1:5174:5174"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - internal

volumes:
  pgdata_dev:

networks:
  internal:
