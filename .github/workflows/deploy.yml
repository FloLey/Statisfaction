name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/floley/statisfaction-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/floley/statisfaction-frontend:latest
          build-args: VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

      - name: Join Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 100.109.197.38
          port: 22
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/Statisfaction
            cat > .env <<'EOF'
            POSTGRES_DB=statisfactory
            POSTGRES_USER=statisfactory_user
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
            BACKEND_IMAGE=ghcr.io/floley/statisfaction-backend
            FRONTEND_IMAGE=ghcr.io/floley/statisfaction-frontend
            IMAGE_TAG=latest
            EOF
            docker compose pull && docker compose up -d --remove-orphans
