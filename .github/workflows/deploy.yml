name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/floley/statisfaction-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/floley/statisfaction-frontend:latest
          build-args: VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Join Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 100.109.197.38 >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@100.109.197.38 "cat > /opt/Statisfaction/.env" <<'ENVEOF'
          POSTGRES_DB=statisfactory
          POSTGRES_USER=statisfactory_user
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          BACKEND_IMAGE=ghcr.io/floley/statisfaction-backend
          FRONTEND_IMAGE=ghcr.io/floley/statisfaction-frontend
          IMAGE_TAG=latest
          ENVEOF
          ssh -i ~/.ssh/id_rsa ${{ secrets.VPS_USER }}@100.109.197.38 \
            "cd /opt/Statisfaction && docker compose pull && docker compose up -d --remove-orphans"
