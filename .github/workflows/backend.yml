name: Backend CI

on: [push, pull_request]

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: statisfaction
          POSTGRES_PASSWORD: statisfaction
          POSTGRES_DB: statisfactiondb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt
        working-directory: backend

      - name: black (format check)
        run: black --check .
        working-directory: backend

      - name: ruff (lint)
        run: ruff check .
        working-directory: backend

      - name: mypy (type check)
        run: mypy app
        working-directory: backend

      - name: pytest + coverage
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://statisfaction:statisfaction@localhost:5432/statisfactiondb_test
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80
        working-directory: backend
